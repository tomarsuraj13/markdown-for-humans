name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch fork branch for cross-repo PR comments
        if: github.event_name == 'issue_comment' && github.event.issue.pull_request != null
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.issue.number }}"
          HEAD_REF=$(gh pr view $PR_NUMBER --repo ${{ github.repository }} --json headRefName -q '.headRefName')
          HEAD_OWNER=$(gh pr view $PR_NUMBER --repo ${{ github.repository }} --json headRepositoryOwner -q '.headRepositoryOwner.login')
          REPO_NAME=$(gh pr view $PR_NUMBER --repo ${{ github.repository }} --json headRepository -q '.headRepository.name')
          BASE_OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          if [ "$HEAD_OWNER" != "$BASE_OWNER" ]; then
            git remote add fork https://github.com/$HEAD_OWNER/$REPO_NAME.git || true
            git fetch fork $HEAD_REF:$HEAD_REF
          fi

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          additional_permissions: |
            actions: read
